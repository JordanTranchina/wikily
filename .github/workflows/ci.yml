name: CI

on:
  push:
    branches:
      - master
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (with coverage)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

      - name: Build frontend
        run: npm run build

  rust:
    name: Rust (fmt, clippy, check)
    # The desktop backend targets macOS primarily (cidre / tauri-nspanel are
    # macOS-only deps), so we compile on macOS to exercise that platform code.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # `tauri::generate_context!` reads frontendDist (../dist) at compile time,
      # so the frontend must be built before any cargo invocation.
      - name: Build frontend
        run: npm run build

      - name: Check formatting
        # Non-blocking: surfaces style drift without failing on pre-existing
        # formatting in the upstream fork.
        continue-on-error: true
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets
